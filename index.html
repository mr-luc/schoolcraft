plantCell:{title:'Schoolcraft: Mission Pflanzenzelle',sub:'Erkunde die Pflanzenzelle, finde die Organellen und sammle Informationen.',done:'Pflanzenzelle geschafft – Bau/Abbau frei!',next:'measureWorld',pos:[0,10,30],yaw:0,pitch:-.24,stations:{zellwand:['Zellwand',1,['Die Zellwand gibt Form und Stabilität.','Sie besteht vor allem aus Cellulose.','Sie liegt außen um die Zellmembran.'],'Welche Aufgabe hat die Zellwand?'],zellmembran:['Zellmembran',2,['Die Zellmembran grenzt die Zelle ab.','Sie kontrolliert Stoffe hinein und hinaus.','Sie liegt unter der Zellwand.'],'Warum ist die Membran wie eine kontrollierte Tür?'],cytoplasma:['Cytoplasma',3,['Das Cytoplasma ist die gelartige Grundsubstanz.','In ihm liegen die Zellorganellen.','Viele Stoffwechselvorgänge finden dort statt.'],'Was befindet sich im Cytoplasma?'],zellkern:['Zellkern',4,['Der Zellkern enthält die Erbinformation.','Er steuert viele Vorgänge.','Die Erbinformation liegt als DNA vor.'],'Warum nennt man ihn Steuerzentrale?'],chloroplasten:['Chloroplasten',5,['Chloroplasten enthalten Chlorophyll.','In ihnen findet Fotosynthese statt.','Dabei entstehen Zucker und Sauerstoff.'],'Welche Aufgabe haben Chloroplasten?'],vakuole:['Vakuole',6,['Die Vakuole ist oft sehr groß.','Sie speichert Wasser und gelöste Stoffe.','Sie hilft beim Zellinnendruck.'],'Warum ist die Vakuole wichtig für Stabilität?'],mitochondrien:['Mitochondrien',7,['Mitochondrien sind Orte der Zellatmung.','Sie stellen nutzbare Energie bereit.','Dafür werden Zucker und Sauerstoff benötigt.'],'Wofür braucht die Zelle Mitochondrien?']}},

  land(-23,1,-2,18,'laender');         // Frankreich / Benelux
  land(-2,20,-6,15,'laender');         // Deutschland / Polen / Mitteleuropa
  land(19,43,-8,17,'laender');         // Osteuropa
  land(-2,20,-39,-12,'laender');       // Skandinavien groß
  land(2,11,17,36,'laender');          // Italien-Stiefel vereinfacht
  land(12,32,18,34,'laender');         // Balkan / Griechenland
  land(34,50,19,31,'laender');         // Türkei-Rand als Orientierung
  // Küsten und Ländergrenzen sichtbarer
  for(let z=-7;z<=18;z+=2){block(-2,2,z,'border',{stationId:'laender'});block(20,2,z,'border',{stationId:'laender'})}
  for(let x=-25;x<=42;x+=2)block(x,2,7,'border',{stationId:'laender'});
  for(let x=-34;x<=-14;x+=2)block(x,2,9,'border',{stationId:'laender'});
  // Hauptstädte mit Gebäuden, deutlich auseinander
  cap(-26,2,22,'Madrid');cap(-12,2,8,'Paris');cap(-32,2,-9,'London');cap(6,2,3,'Berlin');cap(7,2,27,'Rom');cap(10,2,12,'Wien');cap(18,2,2,'Warschau');cap(25,2,27,'Athen');cap(6,2,-30,'Oslo');cap(14,2,-26,'Stockholm');
  // Flüsse breiter und länger
  river([[-14,6],[-12,7],[-10,8],[-8,10],[-6,12],[-4,14],[-3,16]],'fluesse');
  river([[5,9],[9,10],[13,11],[17,12],[21,13],[25,15],[29,16],[33,17]],'donau');
  // Gebirge als große, braune Riegel mit Höhenlinien
  range(-30,8,16,4,'gebirge');         // Pyrenäen
  range(-3,15,24,6,'alpen');           // Alpen deutlich breit
  range(0,-37,10,24,'gebirge');        // Skandinavisches Gebirge
  // Info-Stationen an gut sichtbaren Stellen
  info(-8,3,-5,'europa');info(22,3,7,'laender');info(6,6,3,'hauptstaedte');info(-4,3,16,'fluesse');info(24,3,15,'donau');info(-22,6,8,'gebirge');info(8,9,18,'alpen');
}
function land(x1,x2,z1,z2,stationId){box((x1+x2)/2,1,(z1+z2)/2,x2-x1+1,1,z2-z1+1,'lowland',{stationId})}function city(x,y,z,cap,stationId){block(x,y,z,cap?'capital':'city',{stationId});block(x,y+1,z,cap?'capital':'city',{stationId});if(cap)block(x,y+2,z,'info',{stationId,isStation:true})}function cap(x,y,z,name){city(x,y,z,true,'hauptstaedte');house(x+3,y,z)}function house(x,y,z){cuboid(x,y,z,x+1,y+1,z,'house');block(x,y+2,z,'roof');block(x+1,y+2,z,'roof')}function river(points,stationId){for(const [x,z] of points){block(x,2,z,'water',{stationId});block(x+1,2,z,'water',{stationId});block(x+2,2,z,'water',{stationId})}}function range(sx,sz,w,l,stationId){for(let i=0;i<l;i++){for(let a=0;a<w;a+=2){const x=sx+a,z=sz+i,h=3+Math.floor(Math.sin((a/w)*Math.PI)*4);cuboid(x,2,z,x+1,h,z,'mountain',stationId);if(h>4)block(x,h+1,z,'contour',{stationId})}}}
function resetCam(){camera.position.set(...m().pos);yaw=m().yaw;pitch=m().pitch;rot()}function rot(){pitch=Math.max(-1.4,Math.min(1.15,pitch));camera.rotation.order='YXZ';camera.rotation.y=yaw;camera.rotation.x=pitch}function rayHit(){ray.setFromCamera(center,camera);return ray.intersectObjects(world,false)[0]??null}function targetPos(h){const n=h.face.normal.clone().transformDirection(h.object.matrixWorld).round(),p=h.object.position.clone().add(n);return{x:Math.round(p.x),y:Math.round(p.y),z:Math.round(p.z)}}
function updateTarget(){target=rayHit();const hint=document.getElementById('hint');if(!target){high.visible=false;ghost.visible=false;hint.classList.remove('show');return}high.position.copy(target.object.position);high.scale.copy(target.object.scale).multiplyScalar(1.03);high.visible=true;hint.classList.add('show');const sid=target.object.userData.stationId;if(mode==='info'){ghost.visible=false;hint.textContent=sid&&m().stations[sid]?station(sid).title+': Info sammeln':'Hier gibt es keine Info'}else if(mode==='dig'){ghost.visible=false;hint.textContent=labels[target.object.userData.type]+' abbauen'}else{const p=targetPos(target);ghost.position.set(p.x,p.y,p.z);ghost.scale.set(1,1,1);ghost.visible=true;hint.textContent=labels[sel]+' setzen'}}
function complete(){return collected.size>=order().length}function collect(h){const sid=h?.object.userData.stationId;if(!sid||!m().stations[sid]){toast('Richte das Fadenkreuz auf eine Station oder ein Lernobjekt');return}const isNew=!collected.has(sid);collected.add(sid);saveP();updateUI();openCard(sid);toast(isNew?'Neue Info gesammelt':'Info erneut geöffnet')}function act(){const h=rayHit();if(mode==='info')collect(h);else if(!complete())toast('Erst alle Informationen sammeln');else if(mode==='dig')dig(h);else place(h)}function dig(h){if(!h){toast('Kein Zielblock');return}if(h.object.position.y<=0){toast('Boden bleibt erhalten');return}scene.remove(h.object);world.splice(world.indexOf(h.object),1);toast('Block abgebaut')}function place(h){if(!h){toast('Kein Zielblock');return}const p=targetPos(h);block(p.x,p.y,p.z,sel);toast(labels[sel]+' gesetzt')}
function saveP(){localStorage.setItem(pKey(),JSON.stringify([...collected]))}function saveWorld(){localStorage.setItem(wKey(),JSON.stringify(world.map(o=>o.userData)));toast('Welt gespeichert')}function loadWorld(){const raw=localStorage.getItem(wKey());if(!raw){toast('Noch keine gespeicherte Welt');return}clear();for(const b of JSON.parse(raw))box(b.x,b.y,b.z,b.sx||1,b.sy||1,b.sz||1,b.type,{stationId:b.stationId,isStation:b.isStation});toast('Welt geladen')}function resetProgress(){collected.clear();saveP();setMode('info');updateUI();journal();toast('Sammelauftrag zurückgesetzt')}function restart(){localStorage.removeItem(wKey());localStorage.removeItem(pKey());collected.clear();generate();sel=defaultBlock();toolbar();setMode('info');updateUI();journal();resetCam();closeCard();document.getElementById('journal').classList.remove('show');toast('Mission auf Anfang zurückgesetzt')}function switchMission(id){missionId=id;localStorage.setItem('schoolcraft_current_mission_v5',id);collected=new Set(loadP(id));generate();sel=defaultBlock();toolbar();header();updateUI();journal();setMode('info');resetCam();closeCard();document.getElementById('journal').classList.remove('show');toast(m().title.replace('Schoolcraft: ', '')+' gestartet')}function defaultBlock(){return missionId==='plantCell'?'cytoplasm':missionId==='measureWorld'?'unit':'lowland'}
function header(){document.getElementById('title').textContent=m().title;document.getElementById('sub').textContent=m().sub;const tabs=document.getElementById('tabs');tabs.innerHTML='';Object.keys(missions).forEach((id,i)=>{const b=document.createElement('button');b.className='tab '+(id===missionId?'activeTab':'');b.textContent='Mission '+(i+1);b.onclick=()=>switchMission(id);tabs.appendChild(b)})}function toolbar(){const bar=document.getElementById('bar');bar.innerHTML='';buildable.forEach((id,i)=>{const t=types.find(x=>x[0]===id),b=document.createElement('button');b.className='slot';b.dataset.type=id;b.innerHTML=`<small>${i+1}</small><span class='ico' style='background:#${t[2].toString(16).padStart(6,'0')}'></span>`;b.onclick=()=>selectBlock(id);bar.appendChild(b)});selectBlock(sel)}function selectBlock(id){sel=id;ghostMat.color.set(mat[id].color);document.querySelectorAll('.slot').forEach(s=>s.classList.toggle('on',s.dataset.type===id))}function setMode(n){if((n==='dig'||n==='place')&&!complete()){mode='info';toast('Bau und Abbau werden nach der Mission freigeschaltet')}else mode=n;document.querySelectorAll('.mode').forEach(b=>b.classList.toggle('on',b.dataset.mode===mode));document.getElementById('act').textContent=mode==='info'?'Info sammeln':mode==='dig'?'Block abbauen':'Block setzen'}
function updateUI(){const total=order().length,done=complete();document.getElementById('progress').textContent=done?`${collected.size}/${total} Informationen gesammelt – ${m().done}`:`${collected.size}/${total} Informationen gesammelt`;document.querySelectorAll('.mode[data-mode=dig],.mode[data-mode=place]').forEach(b=>b.disabled=!done);if(!done&&(mode==='dig'||mode==='place'))setMode('info');const list=document.getElementById('list');list.innerHTML='';order().forEach(id=>{const d=collected.has(id),s=station(id),el=document.createElement('div');el.className='station '+(d?'done':'');el.innerHTML=`<span class='check'>${d?'✓':'?'}</span><span>${s.title}</span>`;list.appendChild(el)});const n=document.getElementById('nextBtn');if(m().next){n.disabled=!done;n.textContent=done?'Nächste Mission starten':'Nächste Mission gesperrt'}else{n.disabled=true;n.textContent=done?'Alle Missionen geschafft':'Letzte Mission'}journal()}
function openCard(id){const s=station(id);document.getElementById('cardTitle').textContent=s.title;document.getElementById('facts').innerHTML=s.facts.map(f=>`<li>${f}</li>`).join('');document.getElementById('task').textContent='Notiere: '+s.task;document.getElementById('card').classList.add('show')}function closeCard(){document.getElementById('card').classList.remove('show')}function journal(){const c=document.getElementById('journalContent');if(!collected.size){c.innerHTML='<p style=color:var(--m);line-height:1.45>Noch leer. Sammle zuerst Informationen an den goldenen Stationen oder Lernobjekten.</p>';return}c.innerHTML=order().filter(id=>collected.has(id)).map(id=>{const s=station(id);return`<div class='entry'><h3>${s.title}</h3><ul>${s.facts.map(f=>`<li>${f}</li>`).join('')}</ul><p><b>Merksatz-Auftrag:</b> ${s.task}</p></div>`}).join('')}function toggleJournal(){document.getElementById('journal').classList.toggle('show');journal()}function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>el.classList.remove('show'),1300)}
function bind(){addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(k==='w'||k==='arrowup')move.forward=true;if(k==='s'||k==='arrowdown')move.back=true;if(k==='a'||k==='arrowleft')move.left=true;if(k==='d'||k==='arrowright')move.right=true;if(e.code==='Space')move.up=true;if(e.code==='ShiftLeft'||e.code==='ShiftRight')move.down=true;if(/^[1-9]$/.test(k)&&buildable[+k-1])selectBlock(buildable[+k-1]);if(k==='q')setMode('info');if(k==='e')setMode('place');if(k==='r')setMode('dig');if(k==='f'||e.code==='Enter')act();if(k==='j')toggleJournal();if(k==='escape'){closeCard();document.getElementById('journal').classList.remove('show')}});addEventListener('keyup',e=>{const k=e.key.toLowerCase();if(k==='w'||k==='arrowup')move.forward=false;if(k==='s'||k==='arrowdown')move.back=false;if(k==='a'||k==='arrowleft')move.left=false;if(k==='d'||k==='arrowright')move.right=false;if(e.code==='Space')move.up=false;if(e.code==='ShiftLeft'||e.code==='ShiftRight')move.down=false});renderer.domElement.addEventListener('pointerdown',e=>{if(e.button===1)return;pointer={id:e.pointerId,sx:e.clientX,sy:e.clientY,lx:e.clientX,ly:e.clientY,t:performance.now()};renderer.domElement.setPointerCapture(e.pointerId)});renderer.domElement.addEventListener('pointermove',e=>{if(!pointer||pointer.id!==e.pointerId)return;const dx=e.clientX-pointer.lx,dy=e.clientY-pointer.ly;pointer.lx=e.clientX;pointer.ly=e.clientY;yaw-=dx*.004;pitch-=dy*.004;rot()});renderer.domElement.addEventListener('pointerup',e=>{if(!pointer||pointer.id!==e.pointerId)return;const tap=Math.hypot(e.clientX-pointer.sx,e.clientY-pointer.sy)<6&&performance.now()-pointer.t<260;pointer=null;if(tap)act()});renderer.domElement.addEventListener('contextmenu',e=>{e.preventDefault();if(!complete()){toast('Bauen erst nach der Mission');return}place(rayHit())});document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));document.getElementById('act').onclick=act;document.getElementById('save').onclick=saveWorld;document.getElementById('load').onclick=loadWorld;document.getElementById('resetP').onclick=resetProgress;document.getElementById('restart').onclick=restart;document.getElementById('restartTop').onclick=restart;document.getElementById('nextBtn').onclick=()=>{if(complete()&&m().next)switchMission(m().next)};document.getElementById('journalBtn').onclick=toggleJournal;document.getElementById('closeJournal').onclick=()=>document.getElementById('journal').classList.remove('show');document.getElementById('closeCard').onclick=closeCard;document.querySelectorAll('[data-hold]').forEach(b=>{const a=b.dataset.hold,on=e=>{e.preventDefault();move[a]=true},off=e=>{e.preventDefault();move[a]=false};b.addEventListener('pointerdown',on);b.addEventListener('pointerup',off);b.addEventListener('pointerleave',off);b.addEventListener('pointercancel',off)})}
function movement(dt){const speed=9.5*dt,f=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw)).normalize(),r=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw)).normalize(),d=new THREE.Vector3();if(move.forward)d.sub(f);if(move.back)d.add(f);if(move.left)d.sub(r);if(move.right)d.add(r);if(d.lengthSq())camera.position.add(d.normalize().multiplyScalar(speed));if(move.up)camera.position.y+=speed;if(move.down)camera.position.y-=speed;camera.position.y=Math.max(2,Math.min(72,camera.position.y))}function loop(){const now=performance.now(),dt=Math.min(.04,(now-loop.last)/1000||.016);loop.last=now;movement(dt);updateTarget();renderer.render(scene,camera);requestAnimationFrame(loop)}addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
sel=defaultBlock();toolbar();bind();header();generate();updateUI();resetCam();loop();
</script>
