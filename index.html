plantCell:{title:"Schoolcraft: Mission Pflanzenzelle",subtitle:"Erkunde die Pflanzenzelle, finde die Organellen und sammle Informationen für dein Forscherheft.",done:"Pflanzenzelle geschafft – Bau/Abbau freigeschaltet!",next:"measureWorld",pos:[0,10,30],yaw:0,pitch:-.24,stations:{zellwand:{title:"Zellwand",order:1,facts:["Die Zellwand gibt der Pflanzenzelle Form und Stabilität.","Sie besteht vor allem aus Cellulose.","Sie liegt außen um die Zellmembran."],task:"Notiere: Welche Aufgabe hat die Zellwand?"},zellmembran:{title:"Zellmembran",order:2,facts:["Die Zellmembran grenzt die Zelle ab.","Sie kontrolliert, welche Stoffe hinein und hinaus gelangen.","Bei Pflanzenzellen liegt sie direkt unter der Zellwand."],task:"Notiere: Warum ist die Zellmembran wie eine kontrollierte Tür?"},cytoplasma:{title:"Cytoplasma",order:3,facts:["Das Cytoplasma ist die gelartige Grundsubstanz.","In ihm liegen die Zellorganellen.","Viele Stoffwechselvorgänge finden dort statt."],task:"Notiere: Was befindet sich im Cytoplasma?"},zellkern:{title:"Zellkern",order:4,facts:["Der Zellkern enthält die Erbinformation.","Er steuert viele Vorgänge in der Zelle.","Die Erbinformation liegt als DNA vor."],task:"Notiere: Warum nennt man ihn Steuerzentrale?"},chloroplasten:{title:"Chloroplasten",order:5,facts:["Chloroplasten enthalten Chlorophyll.","In ihnen findet Fotosynthese statt.","Dabei entstehen Zucker und Sauerstoff."],task:"Notiere: Welche Aufgabe haben Chloroplasten?"},vakuole:{title:"Vakuole",order:6,facts:["Die Vakuole ist oft sehr groß.","Sie speichert Wasser und gelöste Stoffe.","Sie hilft beim Zellinnendruck."],task:"Notiere: Warum ist die Vakuole wichtig für Stabilität?"},mitochondrien:{title:"Mitochondrien",order:7,facts:["Mitochondrien sind Orte der Zellatmung.","Sie stellen nutzbare Energie bereit.","Dafür werden Zucker und Sauerstoff benötigt."],task:"Notiere: Wofür braucht die Zelle Mitochondrien?"}}},
measureWorld:{title:"Schoolcraft: Mission Flächen, Volumen und Einheiten",subtitle:"Erkunde ein Messfeld mit Einheitswürfeln, Flächenplatten und Körpern.",done:"Messmission geschafft – Bau/Abbau freigeschaltet!",next:"geoWorld",pos:[0,12,36],yaw:0,pitch:-.28,stations:{laengen:{title:"Längen messen",order:1,facts:["Eine Länge misst du in einer Richtung.","Einheiten sind mm, cm, dm, m und km.","Bei Körpern brauchst du oft Länge, Breite und Höhe."],task:"Notiere: Welche drei Längen brauchst du für einen Quader?"},flaeche:{title:"Fläche",order:2,facts:["Eine Fläche beschreibt, wie groß eine ebene Form ist.","Beim Rechteck gilt: Fläche = Länge · Breite.","Flächeneinheiten haben eine kleine 2: cm², dm², m²."],task:"Notiere: Warum steht bei Flächeneinheiten eine 2?"},quadrat:{title:"Quadrat und Rechteck",order:3,facts:["Ein Quadrat hat vier gleich lange Seiten.","Ein Rechteck hat gegenüberliegende Seiten gleich lang.","Du kannst die Fläche durch Einheitsquadrate zählen."],task:"Notiere: Wie bestimmst du die Fläche einer 5 · 5-Platte?"},volumen:{title:"Volumen",order:4,facts:["Volumen beschreibt, wie viel Raum ein Körper einnimmt.","Beim Quader gilt: Volumen = Länge · Breite · Höhe.","Volumeneinheiten haben eine kleine 3: cm³, dm³, m³."],task:"Notiere: Warum steht bei Volumeneinheiten eine 3?"},quader:{title:"Quader berechnen",order:5,facts:["Ein Quader besteht gedanklich aus Einheitswürfeln.","Zähle eine Schicht und multipliziere mit der Höhe.","Beispiel: 4 · 3 · 2 = 24 Einheitswürfel."],task:"Notiere: Wie berechnest du das Volumen eines Quaders?"},umrechnungFlaeche:{title:"Flächeneinheiten umrechnen",order:6,facts:["Bei Längen gilt: 1 m = 100 cm.","Bei Flächen gilt: 1 m² = 10 000 cm².","Grund: 100 cm · 100 cm = 10 000 cm²."],task:"Notiere: Warum sind 1 m² nicht nur 100 cm²?"},liter:{title:"Volumen und Liter",order:7,facts:["1 dm³ entspricht genau 1 Liter.","1 m³ entspricht 1000 Litern.","Liter nutzt man oft bei Flüssigkeiten."],task:"Notiere: Wie viele Liter passen in 1 m geoWorld:{title:"Schoolcraft: Mission Geographie",subtitle:"Erkunde eine Kartenlandschaft mit Hauptstädten, Grenzen, Maßstab und Höhenlinien.",done:"Geographie-Mission geschafft – Bau/Abbau freigeschaltet!",next:"europeWorld",pos:[0,14,38],yaw:0,pitch:-.32,stations:{karte:{title:"Karte und Wirklichkeit",order:1,facts:["Eine Karte zeigt die Wirklichkeit verkleinert.","Farben, Linien und Symbole stellen Informationen dar.","Die Legende erklärt die Zeichen."],task:"Notiere: Warum braucht eine Karte eine Legende?"},hauptstadt:{title:"Hauptstadt",order:2,facts:["Eine Hauptstadt ist oft der wichtigste politische Ort.","Dort sitzen häufig Regierung oder Parlament.","Auf Karten hat sie oft ein besonderes Symbol."],task:"Notiere: Woran erkennst du eine Hauptstadt?"},laender:{title:"Länder und Grenzen",order:3,facts:["Länder werden auf Karten durch Grenzen getrennt.","Grenzen können als Linien dargestellt werden.","Farben helfen, Länder zu unterscheiden."],task:"Notiere: Wie erkennst du verschiedene Länder?"},hoehenlinien:{title:"Höhenlinien",order:4,facts:["Höhenlinien verbinden Punkte mit gleicher Höhe.","Jede Linie steht für eine bestimmte Höhe.","So erkennt man Berge und Täler auf einer Karte."],task:"Notiere: Was haben Punkte auf einer Höhenlinie gemeinsam?"},steilheit:{title:"Steil oder flach?",order:5,facts:["Enge Höhenlinien zeigen steiles Gelände.","Weite Abstände zeigen flacheres Gelände.","An den Abständen erkennst du die Steigung."],task:"Notiere: Woran erkennst du einen steilen Hang?"},gipfel:{title:"Gipfel und Höhenangabe",order:6,facts:["Der Gipfel ist der höchste Punkt eines Berges.","Die Höhe wird oft mit einer Zahl angegeben.","Geschlossene Höhenlinien können einen Berg zeigen."],task:"Notiere: Wie kann ein Gipfel dargestellt werden?"},massstab:{title:"Maßstab",order:7,facts:["Der Maßstab zeigt die Verkleinerung.","Bei 1 : 100 000 entspricht 1 cm auf der Karte 1 km in Wirklichkeit.","Damit kannst du Entfernungen abschätzen."],task:"Notiere: Wofür brauchst du function insideCell(x,z){return x*x/(26*26)+z*z/(17*17)<=1}function boundary(x,z){return insideCell(x,z)&&(!insideCell(x+1,z)||!insideCell(x-1,z)||!insideCell(x,z+1)||!insideCell(x,z-1))}
function genPlant(){for(let x=-28;x<=28;x++)for(let z=-19;z<=19;z++){if(!insideCell(x,z))continue;addBlock(x,0,z,"cytoplasm",{stationId:"cytoplasma"});if(boundary(x,z)){addBlock(x,1,z,"membrane",{stationId:"zellmembran"});addBlock(x,2,z,"cellwall",{stationId:"zellwand"});addBlock(x,3,z,"cellwall",{stationId:"zellwand"})}}ellipsoid(-9,2,-3,4,3,4,"nucleus","zellkern");ellipsoid(-9,2,-3,1.6,1.2,1.6,"info","zellkern");cuboid(4,1,-4,13,5,5,"vacuole","vakuole",true);ellipsoid(-15,1,8,3,1,2,"chloroplast","chloroplasten");ellipsoid(15,1,-8,3,1,2,"chloroplast","chloroplasten");ellipsoid(9,1,11,3,1,2,"chloroplast","chloroplasten");ellipsoid(-16,1,-8,3,1.2,1.8,"mitochondrion","mitochondrien");ellipsoid(17,1,4,3,1.2,1.8,"mitochondrion","mitochondrien");info(-23,4,0,"zellwand");info(-21,2,7,"zellmembran");info(0,1,-13,"cytoplasma");info(-9,6,-3,"zellkern");info(-15,3,8,"chloroplasten");info(8,6,0,"vakuole");info(-16,3,-8,"mitochondrien")}
function genMeasure(){floor(-26,26,-20,20,"ground");for(let x=-22;x<=-13;x++)addBlock(x,1,-14,"measure",{stationId:"laengen"});info(-17,2,-12,"laengen");for(let x=-22;x<=-18;x++)for(let z=-3;z<=1;z++)addBlock(x,1,z,"area",{stationId:"quadrat"});info(-20,2,3,"quadrat");for(let x=-9;x<=-3;x++)for(let z=-5;z<=-3;z++)addBlock(x,1,z,"area",{stationId:"flaeche"});info(-6,2,-1,"flaeche");addBlock(0,1,-14,"unit",{stationId:"volumen"});info(2,1,-14,"volumen");cuboid(6,1,-16,8,3,-14,"volume","volumen");cuboid(-2,1,8,1,2,10,"volume","quader");info(0,3,12,"quader");for(let x=7;x<=16;x++)for(let z=0;z<=9;z++)if(x===7||x===16||z===0||z===9||x%2===0||z%2===0)addBlock(x,1,z,"area",{stationId:"umrechnungFlaeche"});info(12,2,11,"umrechnungFlaeche");cuboid(17,1,-15,18,2,-14,"unit","liter");cuboid(15,1,-9,20,4,-4,"glass","liter",true);info(18,2,-12,"liter");borderBox(-26,26,-20,20,"measure")}
function genGeo(){floor(-28,28,-21,21,"lowland","karte");for(let z=-21;z<=21;z++){const rx=Math.round(-2+Math.sin(z*.35)*2);addBlock(rx,1,z,"water",{stationId:"karte"});addBlock(rx+1,1,z,"water",{stationId:"karte"});addBlock(-7,1,z,"border",{stationId:"laender"});addBlock(8,1,z,"border",{stationId:"laender"})}for(let x=-28;x<=28;x++)addBlock(x,1,4,"border",{stationId:"laender"});city(-18,1,-8,true,"Westland");city(1,1,12,true,"Mittelland");city(18,1,9,true,"Ostland");city(-20,1,8,false);city(4,1,-10,false);city(20,1,-12,false);for(let x=-24;x<=-15;x++)addBlock(x,1,18,x%2===0?"measure":"unit",{stationId:"massstab"});info(-19,2,16,"massstab");mountain(16,-4,10,"gipfel");addBlock(16,7,-4,"info",{stationId:"gipfel",isStation:true});addBlock(16,8,-4,"info",{stationId:"gipfel",isStation:true});info(7,4,-12,"hoehenlinien");info(22,6,-2,"steilheit");info(-24,2,-18,"karte");info(-7,3,12,"laender");info(-18,4,-8,"hauptstadt")}
function genEurope(){floor(-30,30,-24,24,"water","europa");land(-24,-12,-14,-6,"laender");land(-24,-8,2,14,"laender");land(-18,2,-2,10,"laender");land(2,20,-4,12,"laender");land(-2,10,-20,-6,"laender");land(4,8,12,20,"laender");land(10,18,12,18,"laender");for(let z=-4;z<=12;z++){addBlock(0,2,z,"border",{stationId:"laender"});addBlock(8,2,z,"border",{stationId:"laender"})}for(let x=-18;x<=20;x++)addBlock(x,2,0,"border",{stationId:"laender"});capital(-20,2,10,"Madrid");capital(-12,2,4,"Paris");capital(-18,2,-10,"London");capital(2,2,2,"Berlin");capital(5,2,14,"Rom");capital(4,2,6,"Wien");capital(10,2,3,"Warschau");capital(14,2,16,"Athen");capital(1,2,-14,"Oslo");capital(5,2,-15,"Stockholm");info(-10,3,-2,"europa");info(8,3,-2,"laender");info(2,5,2,"hauptstaedte");river([[-13,0],[-12,1],[-11,2],[-10,3],[-9,4],[-8,5],[-7,6],[-6,7]],"fluesse");river([[2,4],[4,5],[6,5],[8,6],[10,7],[12,8],[14,9],[16,10]],"donau");info(-6,3,8,"fluesse");info(10,3,9,"donau");range(-18,8,10,8,"gebirge");range(0,8,7,10,"alpen");range(1,-18,4,12,"gebirge");info(0,7,7,"gebirge");info(4,8,8,"alpen")}
function floor(x1,x2,z1,z2,type,stationId){for(let x=x1;x<=x2;x++)for(let z=z1;z<=z2;z++)addBlock(x,0,z,type,stationId?{stationId}:{})}function land(x1,x2,z1,z2,stationId){for(let x=x1;x<=x2;x++)for(let z=z1;z<=z2;z++)addBlock(x,1,z,"lowland",{stationId})}function river(points,stationId){for(const [x,z] of points){addBlock(x,2,z,"water",{stationId});addBlock(x+1,2,z,"water",{stationId})}}function capital(x,y,z,name){addBlock(x,y,z,"capital",{stationId:"hauptstaedte",label:name});addBlock(x,y+1,z,"capital",{stationId:"hauptstaedte",label:name});addBlock(x,y+2,z,"info",{stationId:"hauptstaedte",isStation:true,label:name});house(x+2,y,z)}function house(x,y,z){addBlock(x,y,z,"house");addBlock(x+1,y,z,"house");addBlock(x,y+1,z,"house");addBlock(x+1,y+1,z,"house");addBlock(x,y+2,z,"roof");addBlock(x+1,y+2,z,"roof")}function range(sx,sz,w,l,stationId){for(let i=0;i<l;i++)for(let a=0;a<w;a++){const x=sx+a,z=sz+i,h=Math.max(1,5-Math.floor(Math.abs(a-w/2)));for(let y=2;y<=h+1;y++)addBlock(x,y,z,"mountain",{stationId});if(h>=3)addBlock(x,h+2,z,"contour",{stationId})}}
function borderBox(x1,x2,z1,z2,type){for(let x=x1;x<=x2;x++){addBlock(x,1,z1,type);addBlock(x,1,z2,type)}for(let z=z1;z<=z2;z++){addBlock(x1,1,z,type);addBlock(x2,1,z,type)}}function city(x,y,z,cap,label="Stadt"){addBlock(x,y,z,cap?"capital":"city",{stationId:cap?"hauptstadt":"laender",label});addBlock(x,y+1,z,cap?"capital":"city",{stationId:cap?"hauptstadt":"laender",label});if(cap)addBlock(x,y+2,z,"info",{stationId:"hauptstadt",isStation:true,label})}function mountain(cx,cz,r,stationId){for(let x=cx-r;x<=cx+r;x++)for(let z=cz-r;z<=cz+r;z++){const d=Math.hypot(x-cx,z-cz);if(d>r)continue;const h=Math.max(1,Math.floor((r-d)/2)+1);for(let y=1;y<=h;y++)addBlock(x,y,z,"highland",{stationId});if([8,6,4,2].includes(Math.round(d)))addBlock(x,h+1,z,"contour",{stationId:Math.round(d)<=4?"steilheit":"hoehenlinien"})}}
function cuboid(x1,y1,z1,x2,y2,z2,type,stationId,hollow=false){for(let x=Math.min(x1,x2);x<=Math.max(x1,x2);x++)for(let y=Math.min(y1,y2);y<=Math.max(y1,y2);y++)for(let z=Math.min(z1,z2);z<=Math.max(z1,z2);z++){const edge=x===x1||x===x2||y===y1||y===y2||z===z1||z===z2;if(!hollow||edge)addBlock(x,y,z,type,{stationId})}}function ellipsoid(cx,cy,cz,rx,ry,rz,type,stationId){for(let x=Math.floor(cx-rx);x<=Math.ceil(cx+rx);x++)for(let y=Math.floor(cy-ry);y<=Math.ceil(cy+ry);y++)for(let z=Math.floor(cz-rz);z<=Math.ceil(cz+rz);z++)if((x-cx)**2/rx**2+(y-cy)**2/ry**2+(z-cz)**2/rz**2<=1)addBlock(x,y,z,type,{stationId})}function info(x,y,z,stationId){addBlock(x,y,z,"info",{stationId,isStation:true});addBlock(x,y+1,z,"info",{stationId,isStation:true})}
function rot(){pitch=Math.max(-1.35,Math.min(1.15,pitch));camera.rotation.order="YXZ";camera.rotation.y=yaw;camera.rotation.x=pitch}function resetCamera(){camera.position.set(...m().pos);yaw=m().yaw;pitch=m().pitch;rot()}function hit(){ray.setFromCamera(center,camera);return ray.intersectObjects(meshes,false)[0]??null}function placePos(h){const n=h.face.normal.clone().transformDirection(h.object.matrixWorld).round(),p=h.object.position.clone().add(n);return{x:Math.round(p.x),y:Math.round(p.y),z:Math.round(p.z)}}function label(id){return blockTypes.find(t=>t.id===id)?.label??id}
function updateHighlight(){target=hit();const hint=document.getElementById("hint");if(!target){highlight.visible=false;ghost.visible=false;hint.textContent=mode==="info"?"Kein Infopunkt im Ziel":"Kein Block im Ziel";hint.classList.remove("show");return}highlight.position.copy(target.object.position);highlight.visible=true;hint.classList.add("show");const sid=target.object.userData.stationId;if(mode==="info"){ghost.visible=false;hint.textContent=sid&&m().stations[sid]?`${m().stations[sid].title}: Info sammeln`:"Hier gibt es keine Info";return}if(mode==="dig"){ghost.visible=false;hint.textContent=`${label(target.object.userData.type)} abbauen`}else{const p=placePos(target);ghost.position.set(p.x,p.y,p.z);ghost.visible=true;hint.textContent=`${label(selectedType)} setzen`}}
function complete(){return collected.size>=order().length}function collect(h){const sid=h?.object.userData.stationId;if(!sid||!m().stations[sid]){toast("Richte das Fadenkreuz auf eine Station oder ein Lernobjekt");return}const neu=!collected.has(sid);collected.add(sid);saveProgress();updateQuest();openInfo(sid);toast(neu?"Neue Info gesammelt":"Info erneut geöffnet")}function act(){const h=hit();if(mode==="info")collect(h);else if(!complete())toast("Erst alle Informationen sammeln");else if(mode==="dig")dig(h);else place(h)}function dig(h){if(!h){toast("Kein Zielblock");return}if(h.object.userData.y<=0){toast("Boden bleibt erhalten");return}const l=label(h.object.userData.type);removeBlock(h.object);toast(`${l} abgebaut`)}function place(h){if(!h){toast("Kein Zielblock");return}const p=placePos(h);toast(addBlock(p.x,p.y,p.z,selectedType)?`${label(selectedType)} gesetzt`:"Hier ist schon ein Block")}
function saveProgress(){localStorage.setItem(pKey(),JSON.stringify([...collected]))}function saveWorld(){localStorage.setItem(wKey(),JSON.stringify([...world.values()].map(x=>x.userData)));toast("Welt gespeichert")}function loadWorld(){const raw=localStorage.getItem(wKey());if(!raw){toast("Noch keine gespeicherte Welt für diese Mission");return}clearWorld();JSON.parse(raw).forEach(b=>addBlock(b.x,b.y,b.z,b.type,{stationId:b.stationId,isStation:b.isStation,label:b.label}));toast("Welt geladen")}function resetProgress(){collected.clear();saveProgress();setMode("info");updateQuest();journal();toast("Sammelauftrag zurückgesetzt")}function restart(){localStorage.removeItem(wKey());localStorage.removeItem(pKey());collected.clear();generateWorld();selectedType=defaultBlock();makeToolbar();setMode("info");updateQuest();journal();resetCamera();closeInfo();document.getElementById("journal").classList.remove("show");toast("Mission auf Anfang zurückgesetzt")}function switchMission(id){missionId=id;localStorage.setItem("schoolcraft_current_mission_v4",missionId);collected=new Set(loadProgress(id));generateWorld();selectedType=defaultBlock();makeToolbar();header();updateQuest();journal();setMode("info");resetCamera();closeInfo();document.getElementById("journal").classList.remove("show");toast(m().title.replace("Schoolcraft: ","")+" gestartet")}function defaultBlock(){return missionId==="plantCell"?"cytoplasm":missionId==="measureWorld"?"unit":"lowland"}
function makeToolbar(){const bar=document.getElementById("toolbar");bar.innerHTML="";buildable.forEach((id,i)=>{const t=blockTypes.find(x=>x.id===id),b=document.createElement("button");b.className="slot";b.dataset.type=id;b.title=t.label;b.innerHTML=`<small>${i+1}</small><span class="icon" style="background:#${t.color.toString(16).padStart(6,"0")}"></span>`;b.onclick=()=>selectBlock(id);bar.appendChild(b)});selectBlock(selectedType)}function selectBlock(id){selectedType=id;ghostMat.color.set(mats[id].color);document.querySelectorAll(".slot").forEach(s=>s.classList.toggle("active",s.dataset.type===id))}function setMode(next){if((next==="dig"||next==="place")&&!complete()){mode="info";toast("Bau und Abbau werden nach der Mission freigeschaltet")}else mode=next;document.querySelectorAll(".mode").forEach(b=>b.classList.toggle("active",b.dataset.mode===mode));document.getElementById("mainAction").textContent=mode==="info"?"Info sammeln":mode==="dig"?"Block abbauen":"Block setzen"}function header(){document.getElementById("title").textContent=m().title;document.getElementById("subtitle").textContent=m().subtitle;const tabs=document.getElementById("tabs");tabs.innerHTML="";Object.entries(missions).forEach(([id,ms],i)=>{const b=document.createElement("button");b.className="tab "+(id===missionId?"active":"");b.textContent=`Mission ${i+1}`;b.onclick=()=>switchMission(id);tabs.appendChild(b)})}
function updateQuest(){const total=order().length,done=complete();document.getElementById("progress").textContent=done?`${collected.size}/${total} Informationen gesammelt – ${m().done}`:`${collected.size}/${total} Informationen gesammelt`;document.querySelectorAll('.mode[data-mode="dig"],.mode[data-mode="place"]').forEach(b=>b.disabled=!done);if(!done&&(mode==="dig"||mode==="place"))setMode("info");const list=document.getElementById("stationList");list.innerHTML="";order().forEach(id=>{const d=collected.has(id),el=document.createElement("div");el.className="station "+(d?"done":"");el.innerHTML=`<span class="check">${d?"✓":"?"}</span><span>${m().stations[id].title}</span>`;list.appendChild(el)});const n=document.getElementById("nextBtn");if(m().next){n.style.display="block";n.disabled=!done;n.textContent=done?"Nächste Mission starten":"Nächste Mission gesperrt"}else{n.style.display="block";n.disabled=true;n.textContent=done?"Alle Missionen geschafft":"Letzte Mission"}journal()}
function openInfo(id){const s=m().stations[id];document.getElementById("infoTitle").textContent=s.title;document.getElementById("infoFacts").innerHTML=s.facts.map(f=>`<li>${f}</li>`).join("");document.getElementById("infoTask").textContent=s.task;document.getElementById("infoCard").classList.add("show")}function closeInfo(){document.getElementById("infoCard").classList.remove("show")}function journal(){const c=document.getElementById("journalContent");if(!collected.size){c.innerHTML="<p style='color:var(--muted);line-height:1.45'>Noch leer. Sammle zuerst Informationen an den goldenen Stationen oder Lernobjekten.</p>";return}c.innerHTML=order().filter(id=>collected.has(id)).map(id=>{const s=m().stations[id];return`<div class="entry"><h3>${s.title}</h3><ul>${s.facts.map(f=>`<li>${f}</li>`).join("")}</ul><p><b>Merksatz-Auftrag:</b> ${s.task.replace("Notiere: ","")}</p></div>`}).join("")}function toggleJournal(){document.getElementById("journal").classList.toggle("show");journal()}function toast(text){const t=document.getElementById("toast");t.textContent=text;t.classList.add("show");clearTimeout(toast.timer);toast.timer=setTimeout(()=>t.classList.remove("show"),1300)}
function bind(){addEventListener("keydown",e=>{const k=e.key.toLowerCase();if(k==="w"||k==="arrowup")move.forward=true;if(k==="s"||k==="arrowdown")move.back=true;if(k==="a"||k==="arrowleft")move.left=true;if(k==="d"||k==="arrowright")move.right=true;if(e.code==="Space")move.up=true;if(e.code==="ShiftLeft"||e.code==="ShiftRight")move.down=true;if(/^[1-9]$/.test(k)&&buildable[+k-1])selectBlock(buildable[+k-1]);if(k==="q")setMode("info");if(k==="e")setMode("place");if(k==="r")setMode("dig");if(k==="f"||e.code==="Enter")act();if(k==="j")toggleJournal();if(k==="escape"){closeInfo();document.getElementById("journal").classList.remove("show")}});addEventListener("keyup",e=>{const k=e.key.toLowerCase();if(k==="w"||k==="arrowup")move.forward=false;if(k==="s"||k==="arrowdown")move.back=false;if(k==="a"||k==="arrowleft")move.left=false;if(k==="d"||k==="arrowright")move.right=false;if(e.code==="Space")move.up=false;if(e.code==="ShiftLeft"||e.code==="ShiftRight")move.down=false});renderer.domElement.addEventListener("pointerdown",e=>{if(e.button===1)return;pointer={id:e.pointerId,sx:e.clientX,sy:e.clientY,lx:e.clientX,ly:e.clientY,t:performance.now()};renderer.domElement.setPointerCapture(e.pointerId)});renderer.domElement.addEventListener("pointermove",e=>{if(!pointer||pointer.id!==e.pointerId)return;const dx=e.clientX-pointer.lx,dy=e.clientY-pointer.ly;pointer.lx=e.clientX;pointer.ly=e.clientY;yaw-=dx*.004;pitch-=dy*.004;rot()});renderer.domElement.addEventListener("pointerup",e=>{if(!pointer||pointer.id!==e.pointerId)return;const tap=Math.hypot(e.clientX-pointer.sx,e.clientY-pointer.sy)<6&&performance.now()-pointer.t<260;pointer=null;if(tap)act()});renderer.domElement.addEventListener("contextmenu",e=>{e.preventDefault();if(!complete()){toast("Bauen erst nach der Mission");return}place(hit())});document.querySelectorAll(".mode").forEach(b=>b.onclick=()=>setMode(b.dataset.mode));document.getElementById("mainAction").onclick=act;document.getElementById("saveBtn").onclick=saveWorld;document.getElementById("loadBtn").onclick=loadWorld;document.getElementById("resetProgressBtn").onclick=resetProgress;document.getElementById("restartBtn").onclick=restart;document.getElementById("restartTop").onclick=restart;document.getElementById("nextBtn").onclick=()=>{if(complete()&&m().next)switchMission(m().next)};document.getElementById("journalBtn").onclick=toggleJournal;document.getElementById("closeJournal").onclick=()=>document.getElementById("journal").classList.remove("show");document.getElementById("closeInfo").onclick=closeInfo;document.querySelectorAll("[data-hold]").forEach(b=>{const a=b.dataset.hold,on=e=>{e.preventDefault();move[a]=true},off=e=>{e.preventDefault();move[a]=false};b.addEventListener("pointerdown",on);b.addEventListener("pointerup",off);b.addEventListener("pointerleave",off);b.addEventListener("pointercancel",off)})}
function movement(dt){const speed=8.5*dt,f=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw)).normalize(),r=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw)).normalize(),d=new THREE.Vector3();if(move.forward)d.sub(f);if(move.back)d.add(f);if(move.left)d.sub(r);if(move.right)d.add(r);if(d.lengthSq())camera.position.add(d.normalize().multiplyScalar(speed));if(move.up)camera.position.y+=speed;if(move.down)camera.position.y-=speed;camera.position.y=Math.max(2,Math.min(38,camera.position.y))}function loop(){const now=performance.now(),dt=Math.min(.04,(now-loop.last)/1000||.016);loop.last=now;movement(dt);updateHighlight();renderer.render(scene,camera);requestAnimationFrame(loop)}addEventListener("resize",()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
selectedType=defaultBlock();makeToolbar();bind();header();generateWorld();updateQuest();resetCamera();loop();
